name: fazendo build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          # Verifique se o nome do secret no GitHub está EXATAMENTE assim
          username: ${{ secrets.DOKERHUB_USER }} 
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build e push da imagem
        run: |
          docker build -t elivandrolopes/suitecore-back:1.0 .
          docker push elivandrolopes/suitecore-back:1.0

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no ec2 aws
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
              cd /home/ubuntu
              docker compose pull portaria-app
              docker compose up -d portaria-app
